name: Build ClawMemory Core Wheels

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-wheels:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cibw_archs: x86_64
          - os: ubuntu-latest
            cibw_archs: aarch64
          - os: macos-13
            cibw_archs: x86_64
          - os: macos-latest
            cibw_archs: arm64
          - os: windows-latest
            cibw_archs: AMD64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for ARM64 Linux)
        if: matrix.cibw_archs == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          CIBW_BUILD: cp310-* cp311-* cp312-* cp313-*
          # Linux: 安装 OpenSSL 开发库
          CIBW_BEFORE_BUILD_LINUX: >
            pip install setuptools wheel &&
            yum install -y openssl-devel || apt-get install -y libssl-dev || apk add openssl-dev || true
          # macOS: 安装 OpenSSL (Homebrew)
          CIBW_BEFORE_BUILD_MACOS: >
            pip install setuptools wheel &&
            brew install openssl || true
          CIBW_ENVIRONMENT_MACOS: >
            CFLAGS="-O2 -I$(brew --prefix openssl)/include"
            LDFLAGS="-L$(brew --prefix openssl)/lib"
          # Windows: 使用 CNG，无需 OpenSSL
          CIBW_BEFORE_BUILD_WINDOWS: >
            pip install setuptools wheel
          CIBW_ENVIRONMENT_LINUX: >
            CFLAGS="-O2"
          CIBW_ENVIRONMENT_WINDOWS: >
            CFLAGS="/O2"
        with:
          package-dir: backend/clawmemory_core
          output-dir: dist

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ runner.os }}-${{ matrix.cibw_archs }}
          path: dist/*.whl

  release:
    needs: build-wheels
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheel-*
          merge-multiple: true

      - name: List wheels
        run: ls -la dist/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.whl
          generate_release_notes: true
