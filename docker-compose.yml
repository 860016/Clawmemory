version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8765}:8765"
    volumes:
      - ./data:/app/data
      - ./backend/keys:/app/keys
    environment:
      - CLAWMEMORY_SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - CLAWMEMORY_DATA_DIR=/app/data
      - CLAWMEMORY_LICENSE_SERVER_URL=${LICENSE_SERVER_URL:-https://auth.bestu.top}
      - CLAWMEMORY_RSA_PUBLIC_KEY_PATH=/app/keys/public.pem
      - CLAWMEMORY_PORT=8765
      - DEVICE_FINGERPRINT=${DEVICE_FINGERPRINT:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8765/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
