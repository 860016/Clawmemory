# OpenClaw License Platform - Nginx 配置
# 宝塔面板使用方式：网站设置 → 伪静态 → 粘贴以下内容
# 
# 关键：try_files 必须将所有不存在的路径转发到 index.php
# 否则 /api/v1/* 等路由会返回 404

location / {
    try_files $uri $uri/ /index.php?$query_string;
}

# 禁止访问环境配置文件
location ~ \.env$ {
    deny all;
}

# 禁止访问 RSA 密钥目录
location ~ /keys/ {
    deny all;
}
